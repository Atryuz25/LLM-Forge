name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'  # Only deploy if backend code changes
  workflow_dispatch:  # Allow manual triggers from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push backend to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          USERNAME=$(echo "${HF_USERNAME}" | tr -d ' \n\r')
          TOKEN=$(echo "${HF_TOKEN}" | tr -d ' \n\r')
          SPACE=$(echo "${HF_SPACE_NAME}" | tr -d ' \n\r')
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git subtree split --prefix backend -b hf-deploy-branch
          git push --force "https://${USERNAME}:${TOKEN}@huggingface.co/spaces/${USERNAME}/${SPACE}" hf-deploy-branch:main
